[package]
name = "ail-core"
version = "0.0.1"
edition = "2021"

[dependencies]
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
dirs = "5"
uuid = { version = "1", features = ["v4"] }
serde_json = "1"
sha1 = { version = "0.10", features = ["std"] }

[dev-dependencies]
tempfile = "3"
