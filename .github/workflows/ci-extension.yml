name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run at 06:00 UTC — used by the rust-ignored-nightly job
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  # ── Rust: build, test, clippy ─────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo nextest run

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check

  # ── Extension: TypeScript compile + lint + vitest ─────────────────────────
  extension:
    name: Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-ail-chat
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode-ail-chat/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # ── Integration: run --output-format json with built binary ───────────────
  integration:
    name: Structured output integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Verify --output-format json emits NDJSON
        env:
          AIL_DEFAULT_RUNNER: stub
        run: |
          set -euo pipefail
          # Create a minimal passthrough pipeline (no steps — just verifies startup event)
          OUTPUT=$(./target/release/ail --once "hello" --output-format json 2>/dev/null || true)
          echo "Output: $OUTPUT"
          # Each non-empty line must be valid JSON
          echo "$OUTPUT" | grep -v '^$' | while IFS= read -r line; do
            echo "$line" | python3 -c "import sys,json; json.loads(sys.stdin.read())" \
              || (echo "Invalid JSON: $line" && exit 1)
          done
          # Must contain run_started or step_started
          echo "$OUTPUT" | grep -q '"type"' || (echo "No type field found" && exit 1)
          echo "✓ NDJSON output is valid"

  # ── Rust coverage: llvm-cov report ─────────────────────────────────────────
  rust-coverage:
    name: Rust coverage
    runs-on: ubuntu-latest
    # Run on PRs and pushes to main, but not on schedule (nightly)
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Generate coverage report
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov-report
          path: lcov.info
          retention-days: 30

  # ── Nightly: run #[ignore]d tests (Ollama, Claude CLI) ─────────────────────
  rust-ignored-nightly:
    name: Nightly ignored tests
    runs-on: ubuntu-latest
    # Only run on schedule or manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          # Wait for Ollama to be ready
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags >/dev/null 2>&1 && break
            sleep 1
          done
          # Pull a small model for the HTTP runner tests
          ollama pull qwen3:0.6b

      - name: Build
        run: cargo build

      - name: Run ignored tests
        run: |
          # Run only ignored tests. ClaudeCliRunner tests will fail (no claude binary)
          # but Ollama tests should pass.
          cargo nextest run --run-ignored=only 2>&1 || true
          echo "## Nightly ignored tests" >> $GITHUB_STEP_SUMMARY
          echo "Completed — see logs for individual results." >> $GITHUB_STEP_SUMMARY
          echo "Note: ClaudeCliRunner tests are expected to fail (no claude binary installed)." >> $GITHUB_STEP_SUMMARY
