version: "0.0.1"

meta:
  name: "Oh My AIL — Sisyphus Intent Gate"

defaults:
  provider:
    model: gemma4:e4b
    # note to use localhost in WSL you must first create a file called
    # .wslconfig in your windows home directory and include the lines
    #    [wsl2]
    #    networkingMode=mirrored
    base_url: http://localhost:11434
    auth_token: ollama

pipeline:
  # The invocation step IS the classifier. By declaring it explicitly, we skip
  # the implicit LLM call. Classification instructions are in the prompt field
  # (not just system_prompt) so they are reliably seen by all models — including
  # small models where --system-prompt is appended to Claude CLI's base system
  # prompt and may be diluted. Project context is gathered via append_system_prompt:
  # shell: entries and serves as supplementary context for capable models.
  - id: invocation
    tools:
      disabled: true
    system_prompt: ./prompts/sisyphus.md
    append_system_prompt:
      - shell: |
          echo "=== CLAUDE.md ===" && cat CLAUDE.md 2>/dev/null || echo "(no CLAUDE.md found)"
          echo ""
          echo "=== git status ===" && git status --short 2>/dev/null || echo "(not a git repo)"
          echo ""
          echo "=== project structure ===" && find . -name "*.rs" -o -name "*.yaml" -o -name "*.toml" | grep -v target | sort | head -60
    prompt: |
      Classify this request. Explain your reasoning.

      ## User Request
      {{ session.invocation_prompt }}
    output_schema:
      type: object
      properties:
        classification:
          type: string
          enum: ["TRIVIAL", "EXPLICIT", "EXPLORATORY", "AMBIGUOUS"]
        reasoning:
          type: string
      required: [classification]
    on_result:
      - contains: "TRIVIAL"
        action: "pipeline: ./workflows/trivial.ail.yaml"
        prompt: "{{ step.invocation.prompt }}"
      - contains: "EXPLICIT"
        action: "pipeline: ./workflows/explicit.ail.yaml"
        prompt: "{{ step.invocation.prompt }}"
      - contains: "EXPLORATORY"
        action: "pipeline: ./workflows/exploratory.ail.yaml"
        prompt: "{{ step.invocation.prompt }}"
      - contains: "AMBIGUOUS"
        action: "pipeline: ./workflows/ambiguous.ail.yaml"
        prompt: "{{ step.invocation.prompt }}"
      # Fallback: unrecognised output → treat as EXPLICIT
      - always: true
        action: "pipeline: ./workflows/explicit.ail.yaml"
        prompt: "{{ step.invocation.prompt }}"
