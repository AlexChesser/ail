version: "0.0.1"

meta:
  name: "Momus — Plan Reviewer"

pipeline:
  - id: momus
    # TODO: system_prompt: not yet wired in executor — prompt includes system context inline
    system_prompt: ../prompts/momus.md
    prompt: |
      You are Momus, the ruthless plan reviewer. Read ../prompts/momus.md for your full role definition.

      You may read files to verify that referenced paths and functions actually exist.
      Only raise blocking issues. If the plan is sound, say APPROVED.

      ## Plan to Review

      {{ step.invocation.prompt }}
    tools:
      allow:
        - Read
        - Glob
        - Grep
      deny:
        - Edit
        - Write
