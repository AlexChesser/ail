version: "0.0.1"

meta:
  name: "Prometheus — Strategic Planner"

pipeline:
  - id: prometheus
    system_prompt: ../prompts/prometheus.md
    prompt: |
      Produce a complete, verifiable implementation plan. Name specific files, functions, and data structures.
      Define observable success criteria. Scope discipline: everything in the plan traces to the request.

      ## Request and Context

      {{ step.invocation.prompt }}
    tools:
      allow:
        - Read
        - Glob
        - Grep
        - Bash
