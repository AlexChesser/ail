version: "0.0.1"

meta:
  name: "Explore — Codebase Search Specialist"

pipeline:
  - id: explore
    system_prompt: ../prompts/explore.md
    prompt: |
      Return structured results with absolute paths and line numbers. No prose analysis — just findings.

      ## Search Task

      {{ step.invocation.prompt }}
    tools:
      allow:
        - Glob
        - Grep
        - Read
      deny:
        - Edit
        - Write
        - Bash
