version: "0.0.1"

meta:
  name: "Oracle — Strategic Consultant"

pipeline:
  - id: oracle
    system_prompt: ../prompts/oracle.md
    prompt: |
      You have read-only access to the codebase. You cannot modify files.

      ## Consultation Request

      {{ step.invocation.prompt }}
    tools:
