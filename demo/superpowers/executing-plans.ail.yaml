version: "0.0.1"

meta:
  name: "Superpowers — Executing Plans"
  # Based on: https://github.com/obra/superpowers/tree/main/skills/executing-plans
  # Category B workflow: review plan -> execute tasks -> verify -> finish.
  #
  # This pipeline uses output_schema (§26), for_each (§28), and do_while (§27)
  # to decompose a plan into tasks, implement each with a retry loop, and verify.

pipeline:
  # Phase 1: Review and decompose the plan into discrete tasks
  - id: plan
    prompt: |
      Review this implementation plan critically and break it into discrete tasks:

      {{ step.invocation.prompt }}

      Check for:
      - Missing dependencies or prerequisites
      - Unclear or ambiguous instructions
      - Steps that conflict with each other
      - Missing verification steps

      If you find concerns, list them as part of the first task.

      Respond with a JSON array of task descriptions (strings).
      Each task should be a single, actionable implementation step.
      Example: ["Add user model", "Create auth endpoint", "Write tests"]
    append_system_prompt:
      - file: ./prompts/verification-discipline.md
    tools:
      allow:
        - Read
        - Glob
        - Grep
      deny:
        - Edit
        - Write
        - Bash
    output_schema:
      type: array
      items:
        type: string
      maxItems: 20

  # Phase 2: Execute each task with a verification retry loop.
  # for_each iterates over the plan's JSON array. Each iteration runs a
  # do_while loop that implements the task and retries until tests pass.
  - id: execute_tasks
    for_each:
      over: "{{ step.plan.items }}"
      as: task
      max_items: 20
      on_max_items: abort_pipeline
      steps:
        - id: implement_and_verify
          do_while:
            max_iterations: 3
            exit_when: "{{ step.verify.exit_code }} == 0"
            steps:
              - id: implement
                resume: true
                prompt: |
                  Task {{ for_each.index }} of {{ for_each.total }}: {{ for_each.task }}

                  Implement this task completely. Follow the instructions precisely.

                  CRITICAL SAFETY RULES:
                  - Stop immediately when hitting blockers or unclear instructions
                  - Never force through repeated verification failures
                  - Request clarification rather than proceeding with assumptions
                append_system_prompt:
                  - file: ./prompts/tdd-discipline.md
                  - file: ./prompts/verification-discipline.md
                tools:
                  allow:
                    - Read
                    - Edit
                    - Write
                    - Bash
                    - Glob
                    - Grep

              - id: verify
                context:
                  shell: "cargo test 2>&1 && cargo clippy -- -D warnings 2>&1"

  # Phase 3: Final verification across the whole project
  - id: final_verification
    resume: true
    prompt: |
      All tasks from the plan should now be complete.

      Run the full test suite, linter, and build to verify everything works.
      Report actual results with evidence — no claims without verification.
    append_system_prompt:
      - file: ./prompts/verification-discipline.md
    tools:
      allow:
        - Bash
        - Read
        - Glob
        - Grep
      deny:
        - Edit
        - Write

  # Phase 4: Hand off to branch finishing
  - id: finish_branch
    pipeline: ./finishing-branch.ail.yaml
